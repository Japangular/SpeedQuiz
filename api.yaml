openapi: 3.0.1
info:
  title: SpeedQuiz API
  description: API for managing quiz decks and cards
  version: 1.0.1

paths:
  /quizApi/submission-deck:
    get:
      summary: Retrieve a submission deck by username and deck name
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
          description: The username who owns the deck
        - name: deckName
          in: query
          required: true
          schema:
            type: string
          description: The name of the deck to retrieve
      responses:
        '200':
          description: Submission deck retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDeck'
        '404':
          description: Submission deck not found
    post:
      summary: Submit a new deck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionDeck'
      responses:
        '200':
          description: Deck submitted successfully

  /quizApi/available-decks:
    get:
      summary: Get all deck metadata for a given user
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
          description: The username whose decks you want to fetch
      responses:
        '200':
          description: A list of deck metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeckMetadata'

components:
  schemas:
    DeckMetadata:
      type: object
      properties:
        deckName:
          type: string
        username:
          type: string
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PropertyType'
      required:
        - deckName
        - username
        - properties

    SubmissionDeck:
      allOf:
        - $ref: '#/components/schemas/DeckMetadata'
        - type: object
          properties:
            cards:
              type: array
              items:
                type: object
                additionalProperties:
                  type: string
          required:
            - cards

    PropertyType:
      type: string
      enum:
        - question
        - answer
        - hint
        - image
        - svg
        - audio
        - hiragana
        - answer_list
        - info
        - unknown
