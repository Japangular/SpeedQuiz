<div class="deck-shelf-container">

  <!-- Loading state -->
  <mat-progress-bar *ngIf="!(deckGroups$ | async) && !error" mode="indeterminate"></mat-progress-bar>

  <!-- Error state -->
  <mat-card *ngIf="error" class="error-card">
    <mat-icon color="warn">error_outline</mat-icon>
    <span>{{ error }}</span>
  </mat-card>

  <!-- Empty state -->
  <mat-card *ngIf="(deckGroups$ | async)?.length === 0" class="empty-card">
    <mat-icon color="primary">inbox</mat-icon>
    <p>No decks found. Create one to get started!</p>
  </mat-card>

  <!-- Toolbar: multi-select toggle -->
  <div *ngIf="(deckGroups$ | async)?.length" class="shelf-toolbar">
    <button mat-stroked-button (click)="toggleMultiSelectMode()">
      <mat-icon>{{ multiSelectMode ? 'close' : 'library_add' }}</mat-icon>
      {{ multiSelectMode ? 'Cancel' : 'Mix decks' }}
    </button>

    <button *ngIf="multiSelectMode && selectionCount > 0"
            mat-flat-button
            color="primary"
            [matBadge]="selectionCount"
            matBadgeColor="accent"
            (click)="loadSelectedDecks()">
      <mat-icon>play_arrow</mat-icon>
      Start mixed quiz
    </button>
  </div>

  <!-- Deck groups -->
  <mat-accordion *ngIf="deckGroups$ | async as groups" multi>
    <mat-expansion-panel *ngFor="let group of groups" [expanded]="true">

      <mat-expansion-panel-header>
        <mat-panel-title>
          <mat-icon>folder</mat-icon>
          {{ group.attribution }}
        </mat-panel-title>
        <mat-panel-description>
          {{ group.decks.length }} {{ group.decks.length === 1 ? 'deck' : 'decks' }}
        </mat-panel-description>
      </mat-expansion-panel-header>

      <mat-nav-list>
        <mat-list-item *ngFor="let deck of group.decks" (click)="loadDeck(deck)">

          <!-- Checkbox only visible in multi-select mode -->
          <mat-checkbox *ngIf="multiSelectMode"
                        matListItemIcon
                        [checked]="isSelected(deck.id)"
                        (click)="$event.stopPropagation()"
                        (change)="toggleSelection(deck)">
          </mat-checkbox>

          <mat-icon *ngIf="!multiSelectMode" matListItemIcon color="primary">style</mat-icon>

          <span matListItemTitle>{{ deck.name }}</span>
          <span matListItemLine *ngIf="deck.description">{{ deck.description }}</span>

          <button *ngIf="!multiSelectMode"
                  mat-icon-button matListItemMeta
                  (click)="loadDeck(deck); $event.stopPropagation()"
                  [disabled]="loadingDeckId === deck.id">
            <mat-icon>play_arrow</mat-icon>
          </button>
        </mat-list-item>
      </mat-nav-list>

    </mat-expansion-panel>
  </mat-accordion>

  <!-- Loading overlay for individual deck -->
  <mat-progress-bar *ngIf="loadingDeckId" mode="indeterminate"></mat-progress-bar>

</div>
