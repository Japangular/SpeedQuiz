@if (deck$ | async; as deck) {
  <mat-card appearance="outlined">
    <mat-card-content>
  <span class="title">
    <mat-card-title>{{ deck.name }}</mat-card-title>
  </span>
      <button mat-icon-button (click)="resetDeck()" matTooltip="Reset progress">
        <mat-icon>restart_alt</mat-icon>
      </button>
    </mat-card-content>
  </mat-card>
} @else {
  <mat-toolbar class="deck-bar empty">
    <mat-icon>inbox</mat-icon>
    <span>No deck loaded</span>
  </mat-toolbar>
}
