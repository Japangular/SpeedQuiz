<mat-sidenav-container class="sidenav-container">

  <!-- Left Sidebar -->
  <mat-sidenav id=leftDrawer #leftDrawer class="sidenav" fixedInViewport
               [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
               [mode]="(isHandset$ | async) ? 'over' : 'side'"
               [opened]="(isHandset$ | async) === false"
               position="start">
    <mat-toolbar>Left Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-button (click)="toggleLeftDrawer()">Hide</a>
      <a mat-list-item [routerLink]="[{ outlets: { leftOutlet: ['table'] }}]">Table</a>
      <a mat-list-item [routerLink]="[{ outlets: { leftOutlet: ['cardCreator'] }}]">Deck Stepper</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main content area -->
  <mat-sidenav-content>
    <!-- Header: Top bar with title and actions -->
    <mat-toolbar color="primary" class="toolbar">
      <button
        type="button"
        aria-label="Toggle left sidenav"
        mat-icon-button
        (click)="leftDrawer.toggle()">
        <mat-icon aria-label="Left side nav toggle icon">menu</mat-icon>
      </button>
      <span class="toolbar-title">SpeedQuiz</span>
    </mat-toolbar>


    <!-- Router outlet for left side navigation -->
    @if (leftDrawerOpened) {
      <router-outlet name="leftOutlet"></router-outlet>
    }
  </mat-sidenav-content>

</mat-sidenav-container>
