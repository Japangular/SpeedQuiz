<div class="drop-zone" (drop)="onDrop($event)" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" [class.dragging]="isDragging">
  <p *ngIf="!fileName">Drag & Drop transcript JSON here or click to upload</p>
  <p *ngIf="statusMessage">{{ statusMessage }}</p>
  <input type="file" accept=".json" (change)="onFileSelected($event)" hidden #fileInput/>
  <button type="button" (click)="fileInput.click()">Browse</button>
  <span *ngIf="hasHoverText()">
    <button (click)=persistStreamTranscripts() [disabled]="isDisabled()" [title]="hoverText">Persist on server</button>
    <button (click)=reset()>Abort</button>
  </span>
</div>
