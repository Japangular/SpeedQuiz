<mat-form-field appearance="outline">
  <mat-label>Enter kanji</mat-label>
  <input matInput type="text" [formControl]="kanjiControl" placeholder="Enter kanji"/>
</mat-form-field>

<app-stroke-order-kanji
  [japanese]="debouncedKanji"
  [isWrapContent]="false"
  (emitStrokeOrderComplete)="setWk(null, $event)">
</app-stroke-order-kanji>
