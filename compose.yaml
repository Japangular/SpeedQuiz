version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: speedquizdb
      POSTGRES_USER: speedquiz
      POSTGRES_PASSWORD: X9@1b6Y2p3Z4w3k5P5L6m1
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: BackendSpeed/Dockerfile.backend
    command: java -version
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OPENAPI_SPEC_PATH: /app/api.yaml
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - ./api.yaml:/app/api.yaml
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  frontend:
    build:
      context: .
      dockerfile: FrontendQuiz/Dockerfile.frontend
    ports:
      - "4200:80"  # You may not need to expose this port as Nginx will serve the content
    volumes:
      - ./api.yaml:/app/api.yaml
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4200" ]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  nginx:
    build:
      context: .
      dockerfile: FrontendQuiz/Dockerfile.frontend  # Build from the frontend Dockerfile
    ports:
      - "80:80"
    depends_on:
      - frontend

volumes:
  db-data:
