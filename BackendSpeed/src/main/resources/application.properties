spring.application.name=BackendSpeed

# PostgreSQL (shared settings ? profiles override url)
spring.datasource.postgresql.username=speedquiz
spring.datasource.postgresql.password=${POSTGRES_PASSWORD}
spring.datasource.postgresql.driver-class-name=org.postgresql.Driver

# HikariCP pool settings
spring.datasource.postgresql.hikari.maximum-pool-size=10
spring.datasource.postgresql.hikari.minimum-idle=2
spring.datasource.postgresql.hikari.connection-timeout=30000
spring.datasource.postgresql.hikari.idle-timeout=600000

# Flyway
spring.flyway.user=speedquiz
spring.flyway.password=${POSTGRES_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework.dao=info
logging.level.org.springframework.web=info

# App
app.wanikani.use-dev-cache=true